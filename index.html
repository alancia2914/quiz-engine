<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Governance Study Engine</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --success: #06d6a0;
            --warning: #ffd166;
            --text: #f0f0f0;
            --text-muted: #a0a0b0;
            --card-bg: #1e1e36;
            --card-border: #2a2a4a;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container { max-width: 640px; margin: 0 auto; padding: 16px; }

        /* Header */
        .header { text-align: center; padding: 24px 0; }
        .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .header p { color: var(--text-muted); font-size: 0.9rem; }

        /* Category Groups */
        .category-group { margin-bottom: 24px; }
        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .category-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .category-chevron {
            transition: transform 0.2s;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .category-header.collapsed .category-chevron { transform: rotate(-90deg); }
        .category-modules { display: grid; gap: 10px; }
        .category-modules.hidden { display: none; }

        /* Module Cards */
        .module-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .module-card:hover, .module-card:active { border-color: var(--highlight); }
        .module-card.selected { border-color: var(--highlight); background: rgba(233, 69, 96, 0.08); }

        .module-checkbox {
            width: 22px; height: 22px; min-width: 22px;
            border: 2px solid var(--card-border);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .module-card.selected .module-checkbox {
            border-color: var(--highlight);
            background: var(--highlight);
        }
        .module-checkbox::after {
            content: '✓'; color: white; font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .module-card.selected .module-checkbox::after { opacity: 1; }

        .module-info { flex: 1; }
        .module-info h3 { font-size: 1rem; margin-bottom: 2px; }
        .module-info p { color: var(--text-muted); font-size: 0.8rem; }
        .module-info .stats {
            display: flex; gap: 12px; margin-top: 8px; font-size: 0.75rem;
        }
        .module-info .stats span { color: var(--text-muted); }
        .module-info .stats .score { color: var(--success); }

        /* Start Button */
        .start-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--primary);
            border-top: 1px solid var(--card-border);
            padding: 12px 16px;
            display: none;
            justify-content: center;
        }
        .start-bar.show { display: flex; }
        .start-btn {
            width: 100%; max-width: 640px;
            padding: 14px;
            background: var(--highlight);
            color: white; border: none;
            border-radius: 10px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .start-btn:disabled { opacity: 0.5; cursor: default; }

        /* Quiz View */
        .quiz-view { display: none; }
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 1rem; cursor: pointer; padding: 8px 12px;
            border-radius: 8px; transition: background 0.2s;
        }
        .back-btn:hover { background: var(--card-bg); }

        .progress-bar {
            width: 100%; height: 4px; background: var(--card-border);
            border-radius: 2px; margin-bottom: 24px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--highlight);
            border-radius: 2px; transition: width 0.3s ease;
        }

        /* Question Card */
        .question-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: var(--radius); padding: 24px; margin-bottom: 16px;
        }
        .question-label {
            font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px;
        }
        .question-text {
            font-size: 1.1rem; font-weight: 500; margin-bottom: 20px; line-height: 1.5;
        }

        /* MCQ */
        .options { display: grid; gap: 10px; }
        .option-btn {
            background: var(--secondary); border: 1px solid var(--card-border);
            border-radius: 10px; padding: 16px 20px; color: var(--text);
            font-size: 0.95rem; text-align: left; cursor: pointer;
            transition: all 0.15s; -webkit-tap-highlight-color: transparent; line-height: 1.4;
        }
        .option-btn:hover { border-color: var(--highlight); }
        .option-btn.correct { border-color: var(--success); background: rgba(6, 214, 160, 0.1); }
        .option-btn.incorrect { border-color: var(--highlight); background: rgba(233, 69, 96, 0.15); opacity: 0.7; }
        .option-btn:disabled { cursor: default; }

        /* Matching */
        .matching-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .match-column { display: flex; flex-direction: column; gap: 8px; }
        .match-column-label {
            font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 4px; text-align: center;
        }
        .match-item {
            background: var(--secondary); border: 1px solid var(--card-border);
            border-radius: 8px; padding: 12px; font-size: 0.85rem;
            cursor: pointer; transition: all 0.15s; text-align: center;
            min-height: 48px; display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent; line-height: 1.3;
        }
        .match-item.selected { border-color: var(--highlight); background: rgba(233, 69, 96, 0.1); }
        .match-item.matched { border-color: var(--success); background: rgba(6, 214, 160, 0.1); cursor: default; }
        .match-item.incorrect { border-color: var(--highlight); animation: shake 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* Explanation */
        .explanation {
            background: var(--secondary); border-left: 3px solid var(--success);
            border-radius: 0 8px 8px 0; padding: 16px; margin-top: 16px;
            font-size: 0.9rem; color: var(--text-muted); display: none; line-height: 1.5;
        }
        .explanation.show { display: block; }

        /* Next Button */
        .next-btn {
            display: none; width: 100%; padding: 16px; background: var(--highlight);
            color: white; border: none; border-radius: 10px; font-size: 1rem;
            font-weight: 600; cursor: pointer; margin-top: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        .next-btn.show { display: block; }

        /* Results */
        .results-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: var(--radius); padding: 32px 24px; text-align: center;
        }
        .results-card h2 { font-size: 1.4rem; margin-bottom: 8px; }
        .results-score { font-size: 3rem; font-weight: 700; color: var(--success); margin: 16px 0; }
        .results-detail { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
        .results-actions { display: grid; gap: 10px; }
        .results-actions button {
            padding: 14px; border-radius: 10px; font-size: 0.95rem;
            font-weight: 500; cursor: pointer; border: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary { background: var(--highlight); color: white; }
        .btn-secondary { background: var(--secondary); border: 1px solid var(--card-border); color: var(--text); }

        /* Stats Panel */
        .stats-panel {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: var(--radius); padding: 20px; margin-top: 24px;
        }
        .stats-panel h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; }
        .stat-item .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-item .stat-label { font-size: 0.75rem; color: var(--text-muted); }

        /* Bottom padding for fixed start bar */
        .home-bottom-pad { height: 80px; }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 12px; }
            .question-card { padding: 20px 16px; }
            .matching-container { grid-template-columns: 1fr; gap: 16px; }
            .match-column { border: 1px solid var(--card-border); border-radius: 8px; padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Home View -->
        <div id="home-view">
            <div class="header">
                <h1>Governance Study Engine</h1>
                <p>Select modules to study</p>
            </div>
            <div id="module-list"></div>
            <div class="home-bottom-pad"></div>
            <div class="stats-panel" id="global-stats" style="display:none;">
                <h3>Overall Progress</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="total-answered">0</div>
                        <div class="stat-label">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="total-accuracy">0%</div>
                        <div class="stat-label">Accuracy</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="total-streak">0</div>
                        <div class="stat-label">Streak</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quiz View -->
        <div id="quiz-view" class="quiz-view">
            <div class="quiz-header">
                <button class="back-btn" id="back-btn">&larr; Back</button>
                <span id="question-counter" style="color: var(--text-muted); font-size: 0.85rem;"></span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div id="question-area"></div>
            <div class="explanation" id="explanation"></div>
            <button class="next-btn" id="next-btn">Next</button>
        </div>

        <!-- Results View -->
        <div id="results-view" style="display:none;">
            <div class="results-card">
                <h2>Round Complete</h2>
                <div class="results-score" id="results-score"></div>
                <div class="results-detail" id="results-detail"></div>
                <div class="results-actions">
                    <button class="btn-primary" id="retry-weak-btn">Retry Weak Questions</button>
                    <button class="btn-secondary" id="retry-all-btn">Retry All</button>
                    <button class="btn-secondary" id="back-home-btn">Back to Modules</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed start bar -->
    <div class="start-bar" id="start-bar">
        <button class="start-btn" id="start-quiz-btn">Start Quiz</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
